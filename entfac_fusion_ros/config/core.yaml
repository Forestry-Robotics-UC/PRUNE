# Core prune_node defaults
semantic_topic: "/semantic/labels"
semantic_input_type: "labels"  # "labels" or "rgb" (original colors)
undistort_semantic: false      # undistort semantic image using CameraInfo distortion (lidar mode only)
undistort_alpha: 0.0           # 0=crop to valid pixels, 1=keep all pixels
confidence_topic: ""          # optional
projection_invalid_mask_topic: "" # optional invalid-mask topic aligned with semantic_topic (0=valid, projection_invalid_mask_value=invalid)
projection_invalid_mask_value: 255 # pixel value in projection_invalid_mask_topic that rejects transferred semantics/RGB
projection_invalid_mask_dilate_px: 0 # dilation radius applied to the invalid mask before projection sampling
camera_info: "/camera/color/camera_info"  # CameraInfo topic (used when camera_info_txt is empty)
camera_info_txt: ""           # optional calibration file path; if set, intrinsics load from file
camera_frame: ""              # optional fallback frame_id used with camera_info_txt when file has no frame_id
depth_input_topic: "/camera/depth/image_rect_raw"  # geometry input: depth Image or LiDAR PointCloud2
target_frame: "camera_color_optical_frame"
include_unlabeled: false
mode: ""                     # "depth" or "lidar" to force; empty=auto-detect

debug: false                 # if true, node prints full startup parameter report
core_debug: false            # if true, enable entfac_fusion_core DEBUG logs (can be noisy)
status_period: ""              # empty=auto (1s when debug=true, else disabled); set to 0 to disable explicitly

depth_scale: 0.0               # 0=auto (16UC1/mono16 treated as mm); set to 1.0 if your depth is already in meters
max_depth_m: 30                # 0 disables; otherwise drop points with depth > max_depth_m
filter_invalid_depth: true     # if true, zero out 0 and 65535 for 16UC1/mono16 before scaling

sync_slop_sec: 0.01            # ApproximateTimeSynchronizer slop for semantic/depth pairing
pair_max_dt_sec: 0.03          # hard max |Δt| between semantic and geometry (<=0 disables)
sync_queue_size: 5             # ApproximateTimeSynchronizer queue size

cloud_time_offset_sec: 0.0     # signed offset added to output cloud stamp (negative shifts earlier)
cloud_stamp_source: ""         # auto, semantic, depth, lidar, latest, earliest, midpoint
stamp_debug_log_period_sec: 2.0 # min seconds between timestamp/offset debug logs (0 logs every callback when debug=true)

downsample_factor: 1           # integer >=1; higher saves CPU
semantic_color_quantization_step: 1  # used only for rgb input (set to 8/16 for JPEG artifacts)
colorize_labels: true        # publish PointCloud2 rgb field (labels: uses color_map; rgb: uses semantic image colors)
color_map: {"0": [0, 0, 0],
            "1": [120, 120, 70],
            "2": [255, 170, 146],
            "3": [61, 230, 250],
            "4": [204, 255, 4],
            "5": [4, 250, 7],
            "6": [12, 189, 102],
            "7": [255, 41, 10],
            "8": [51, 0, 255],
            "9": [150, 5, 61],
            "10": [255, 0, 122],
            "11": [0, 140, 0],
            "12": [100, 65, 0]}               # {label_id: [r,g,b], ...} used for output coloring when semantic_input_type=labels (quote numeric keys: "0": [r,g,b])
random_color_seed: 1          # used only when colorize_labels=true and color_map is empty (deterministic random palette)
num_labels: 0                 # 0=auto from first labels image (used only for random palette)

debug_project_lidar: false
