semantic_topic: "/semantic/labels"
semantic_input_type: "labels"  # "labels" or "rgb" (original colors)
confidence_topic: ""          # optional
camera_info: "/camera/color/camera_info"
depth_input_topic: "/camera/depth/image_rect_raw"  # geometry input: depth Image or LiDAR PointCloud2
target_frame: "base_link"
include_unlabeled_pts: false
debug: true                 # if true, node prints full startup parameter report
core_debug: false            # if true, enable entfac_fusion_core DEBUG logs (can be noisy)
mode: ""                     # "depth" or "lidar" to force; empty=auto-detect
semantic_color_quantization_step: 1  # used only for rgb input (set to 8/16 for JPEG artifacts)
colorize_labels: false        # publish PointCloud2 rgb field (labels: uses color_map; rgb: uses semantic image colors)
color_map: {}                 # {label_id: [r,g,b], ...} used for output coloring when semantic_input_type=labels (quote numeric keys: "0": [r,g,b])
random_color_seed: 1          # used only when colorize_labels=true and color_map is empty (deterministic random palette)
num_labels: 0                 # 0=auto from first labels image (used only for random palette)
downsample_factor: 1           # integer >=1; higher saves CPU
sync_slop_sec: 0.01            # ApproximateTimeSynchronizer slop for semantic/depth pairing
sync_queue_size: 5             # ApproximateTimeSynchronizer queue size
cloud_time_offset_sec: 0.0     # signed offset added to output cloud stamp (negative shifts earlier)
cloud_stamp_source: ""         # auto, semantic, depth, lidar, latest, earliest, midpoint
enable_profiling: false
depth_scale: 0.0               # 0=auto (16UC1/mono16 treated as mm); set to 1.0 if your depth is already in meters
max_depth_m: 30                # 0 disables; otherwise drop points with depth > max_depth_m
filter_invalid_depth: true     # if true, zero out 0 and 65535 for 16UC1/mono16 before scaling
status_period: ""              # empty=auto (1s when debug=true, else disabled); set to 0 to disable explicitly
ply_output_dir: ""             # empty uses <entfac_fusion_ros>/output/ply; used by ~save_ply / ~set_ply_recording
ply_target_frame: ""           # optional TF frame for PLY output (empty uses target_frame)
ply_tf_use_latest: false       # if true, fall back to latest TF for PLY export
ply_tf_tolerance_sec: 0.02     # max allowed time difference when using latest TF for PLY export

# Optional static extrinsics (row-major 4x4). If empty, TF lookup is used.
static_target_T_depth: []      # depth frame -> target frame
static_camera_T_lidar: []      # lidar frame -> camera frame
static_target_T_lidar: []      # lidar frame -> target frame
