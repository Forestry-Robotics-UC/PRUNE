# Choupal bag defaults
semantic_topic: "/segmentation/test"
semantic_input_type: "rgb"
confidence_topic: ""
camera_info: "/realsense/aligned_depth_to_color/camera_info"
depth_input_topic: "/realsense/aligned_depth_to_color/image_raw"  # Either PointCloud2 or DepthImage
target_frame: "base_link"
include_unlabeled_pts: false
debug: false
semantic_color_quantization_step: 16  # helps reduce JPEG palette artifacts in compressed segmentation outputs
colorize_labels: true  # publish PointCloud2 rgb field with the semantic image colors
color_map: {}  # only used when semantic_input_type=labels
downsample_factor: 1
enable_profiling: false
depth_scale: 0.0  # 0=auto (16UC1/mono16 treated as mm)

# Optional static extrinsics (row-major 4x4). If empty, TF lookup is used.
static_target_T_depth: []      # depth frame -> target frame
static_camera_T_lidar: []      # lidar frame -> camera frame
static_target_T_lidar: []      # lidar frame -> target frame
