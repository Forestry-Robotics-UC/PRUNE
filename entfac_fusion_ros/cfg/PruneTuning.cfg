#!/usr/bin/env python3

PACKAGE = "entfac_fusion_ros"

from dynamic_reconfigure.parameter_generator_catkin import *


gen = ParameterGenerator()

patch_size_enum = gen.enum(
    [
        gen.const("Patch1", int_t, 1, "1x1 center pixel"),
        gen.const("Patch3", int_t, 3, "3x3 robust local patch"),
        gen.const("Patch5", int_t, 5, "5x5 robust local patch"),
        gen.const("Patch7", int_t, 7, "7x7 robust local patch"),
        gen.const("Patch9", int_t, 9, "9x9 robust local patch"),
    ],
    "Odd patch size for LiDAR-to-image sampling.",
)

projection = gen.add_group("Projection")
projection.add(
    "projection_patch_size",
    int_t,
    0,
    "Odd patch size for robust LiDAR-to-image sampling.",
    1,
    1,
    9,
    edit_method=patch_size_enum,
)
projection.add(
    "projection_confidence_min",
    double_t,
    0,
    "Minimum patch confidence required before transferred RGB or labels are trusted.",
    0.0,
    0.0,
    1.0,
)
projection.add(
    "projection_occlusion_epsilon_m",
    double_t,
    0,
    "Depth margin in meters for local z-buffer occlusion gating.",
    0.0,
    0.0,
    1.0,
)
projection.add(
    "projection_occlusion_radius_px",
    int_t,
    0,
    "Pixel radius used for local min-depth occlusion gating.",
    0,
    0,
    16,
)
projection.add(
    "projection_reject_depth_edges",
    bool_t,
    0,
    "Reject RGB transfer when the projected point lands on a strong LiDAR depth edge.",
    False,
)
projection.add(
    "projection_depth_edge_thresh",
    double_t,
    0,
    "Normalized depth-edge threshold used for projection rejection.",
    0.15,
    0.0,
    1.0,
)
projection.add(
    "projection_depth_edge_radius_px",
    int_t,
    0,
    "Pixel dilation radius for the LiDAR depth-edge reject mask.",
    0,
    0,
    16,
)

debug_projection = gen.add_group("DebugProjection")
debug_projection.add(
    "debug_project_lidar",
    bool_t,
    0,
    "Publish the projected-LiDAR overlay debug image.",
    False,
)
debug_projection.add(
    "debug_project_lidar_stride",
    int_t,
    0,
    "Stride used when drawing projected LiDAR points.",
    5,
    1,
    64,
)
debug_projection.add(
    "debug_project_lidar_radius",
    int_t,
    0,
    "Marker radius in pixels for projected LiDAR debug points.",
    0,
    0,
    8,
)
debug_projection.add(
    "debug_project_lidar_outline_only",
    bool_t,
    0,
    "Draw projected LiDAR markers as outlines so the image stays readable.",
    False,
)

tracked = gen.add_group("TrackedReprojection")
tracked.add(
    "tracked_reprojection_fb_thresh_px",
    double_t,
    0,
    "Forward-backward optical-flow consistency threshold in pixels.",
    1.5,
    0.1,
    20.0,
)
tracked.add(
    "tracked_reprojection_depth_edge_thresh",
    double_t,
    0,
    "Normalized LiDAR depth-edge threshold used by tracked reprojection.",
    0.15,
    0.0,
    1.0,
)
tracked.add(
    "tracked_reprojection_min_image_edge",
    double_t,
    0,
    "Minimum image-edge strength required for a track to affect the metric.",
    0.05,
    0.0,
    1.0,
)
tracked.add(
    "tracked_reprojection_min_tracks",
    int_t,
    0,
    "Minimum active tracks to maintain before replenishing features.",
    80,
    10,
    1000,
)

exit(gen.generate(PACKAGE, "entfac_fusion_ros", "PruneTuning"))
