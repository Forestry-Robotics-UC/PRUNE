  # Optional GUI container (RViz, rqt, etc) displayed on the host via X11.
  # Host prereq (run once per session): `xhost +si:localuser:$(whoami)`
  sensor-fusion-ros-gui:
    image: ros-entfac:latest
    container_name: entfac_sensor_fusion_ros_gui
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/home/ros/.Xauthority
    volumes:
      - /mnt/bumble/entfac_utils/ENTFAC-Sensor-Fusion/:/home/ros/ws/src/entfac_fusion:rw
      - /mnt/phd/datasets/choupal_v2:/bags:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/home/ros/.Xauthority:ro
    working_dir: /home/ros/ws
    tty: true
    stdin_open: true
    command: ["/bin/bash"]
